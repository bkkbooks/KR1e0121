body:
  text: 春秋隨筆卷上瀘溪縣知縣顧奎光撰董仲舒曰春秋文成數萬其指數千言其義例無窮不可執一也夫例從義起非義從例生義有變通而例多拘碍説經者不因經以求義乃立例以釋經宜其勉强傅㑹春秋言修者所以不殁魯史之舊言作者所以特著聖人之功吕大圭論春秋有達例有特筆所謂特筆則是非褒貶所在也然亦須理㑹大處不可苛細繳繞如書天王狩於河陽便是旋乾轉坤之筆左氏記事直叙周鄭交質豈復存得君臣名分朱子曰當時天下大亂聖人且據實而書之其是非得失付之後世公論盖有言外之意若必於一字一辭之間求褒貶所在却恐不然又曰聖人只是書放那裏使後世因此去考見道理讀春秋者宜本此意觀之屬辭比事意義無窮不然褒貶只是一事便結煞無餘味程子言春秋諸侯不禀命天王擅相侵伐春秋直書其事而常責夫被侵伐者此語未允當時天子僅亦守府上告何益方伯失職即齊晉為霸主是非曲直未必盡公鄰國之近者皆有狡焉啟疆之心訴之方伯赴之鄰國亦何益小國困敝阽於危亡非與之戰則坐見削弱俘執耳既被侵伐復受咎責何以服其心乎竊謂其國有自取侵伐之理不能反己自責忿而與戰則責被侵伐者可也不然則當責擅侵伐之人如齊人滅遂而齊人殱於遂必無舍齊而責遂之理也孫覺言㑹盟則以主㑹為首侵伐則以主兵為首斯為平論春秋將以治世之無王者而於宰咺歸賵則曰貶而書名於榮叔歸含且賵則曰王不稱天胡氏説如此則無王自春秋始矣以天王之尊下賵諸侯之妾直書之其失自見不待於貶而春秋亦不得而貶之宰咺何以名不得其字則名之耳如書名為貶則榮叔為褒可乎書王為貶則天王為褒可乎宰咺歸賵當與武氏子來求賻對看仲子之卒也天王賵之冡宰實來及天王之崩魯不聞赴弔助喪致使來求賻天王固失其為上魯亦失其為下矣故曰屬辭比事春秋教也諸侯之卒其不名者盖史失之左傳謂同盟則赴以名趙氏匡據禮駁之是矣孫氏覺謂即位之初或以名赴或不以名赴其説近理然國君之名通國皆知不容鄰國君臣都不知其名字必待即位之赴朝聘㑹盟之同然後識之若果存沒隔絶名字不知又何必獨書其卒且豈有弔恤之禮耶故書卒必有名其不名者必史本失之或乆而遺缺也衞人立晉予之意多所謂得乎邱民者也其不請命於天子則無王矣故曰衞人立至責以不承命於先君則非何者無可承也荘公既立桓公矣安知桓之被弑而更立晉桓公倉卒被弑又安能遺命誰立晉既於次當立且國人所同欲其立正也衞人能討賊塟君而立先君之子弟其立晉亦正也故曰子之意多尹氏之立王子朝私也衞人之立晉公也公私既殊豈應同貶且晉武公滅緡自立請於王而列為諸侯雖請命天子猶不如立晉之正貶此褒彼於義安乎春秋據事直書内無所承上不禀命其失自見公穀竟以為不宜立則失言矣考仲子之宫初獻六羽是前此皆八佾也六羽正矣施之仲子猶僣也但考之於禮則為僣論其事勢則可疑隠既將致國於桓而以仲子為嫡則仲子固夫人矣方當入惠公之廟而别立宫以祀之何也既立宫矣則禮宜從同而又降用六羽何也不能正嫡妾之分以裁之復不能純用正嫡之禮處之尊與降兩無所居而臣民之心疑桓公之心亦疑矣立宫則疑於外之用六則疑於抑之魯君臣沿襲已乆不知用六之為得正但知用六之為降殺且不知立宫之欲擬於嫡但知立宫之幾例於妾此意不明而羽父請殺桓公之説來矣進退失據未有若此舉者人君行事當光明顯白路人皆知母居嫌疑之間使人曖昧測度嘗疑羽父請殺桓公突如其來觀此則讓桓之心隐固有不盡明白者羽父殆非無因也隐公弑而書薨公羊氏曰不地不忍言也穀梁氏曰不忍地也非也春秋書弑君多不地皆不忍乎人君薨於路寢為正燕寢為不正被弑則不得正其終甚矣故不書諱也以為諱弑而以不地著之者亦非也藉欲著之則書曰公薨於寪氏豈不更得其實而反以不地著也此全乎諱焉耳孔父之死惟公羊得表章死節意杜氏云孔父稱名内不能治其閨門外取怨於民身死而禍及君故貶之其不通經固已然此等議論亦其時為之魏簒漢晉簒魏而髙貴鄉公之死魏之廷臣惟司馬孚陳泰少伸正論餘皆習為故常無復知仗節死難之義者母丘儉諸葛誕討賊不成覆指為罪貶孔父之説有自來矣華督弑君亂矣因此時討賊而立君焉亂猶可治而㑹於稷以成之是亂在宋而成其亂者四國也立荘公以定君立華氏以定相難似平矣而聖人以為此大亂也苟討賊復讎雖喋血横尸猶當為治今賊不討讎不復雖社稷無廢祀民人無廢主彌見為亂而其亂直與國相終始聖人之垂戒切矣定宋公桓之私也立華氏翬之私也立華氏而翬命為公子矣故三年即書公子翬如齊逆女成宋亂以自定也故穀梁曰内為志焉爾桓公弑立懼討故易祊盟越以結鄭好而齊陳未之及也借宋之賂并合二國以定宋於是齊陳不必結好而自莫之致討矣郜鼎納於太廟桓非貪賂也正欲章示臣民見弑君者非特無討與國且將立之而宋并恃已而立以見其無所畏忌春秋詳書之非為宋也以誅桓之心爾胥命者不成盟也其相命之事未可知曰褒曰貶臆説也甲戌乙丑趙氏匡謂甲戌下當記佗作亂之事全簡脱之其説為是但三傳謂是魯史舊文黄氏仲炎謂筆削後傳錄之誤二日並存不應述而不削其語謬矣子曰吾猶及史之闕文也疑而削之與補之改之何異乎仍叔世大夫也仍叔之子將嗣為大夫者也其父猶在未命為大夫而使之來聘㣲弱耳故書仍叔之子紀實也程子謂父受命而使子代行固無是理若父老而子代從政則何譏乎説春秋者動輙是貶冡宰書名見貶王不稱天示譏比於仍叔之子無可推求則曰譏代從政譏世官殆㡬於轉喉觸諱捩手覆羮矣家氏曰仍叔之子不名貶也彼既未命則官及名字皆無可書何待於貶乎天子逆女禮無明文桓公八年祭公來遂逆王后於紀其失在王而祭公無與焉王既重大婚之禮使三公逆之然使來魯而遂往迎君無専命臣不復命二事而一行則輕之甚矣豈正始之道哉以擅命責祭公皆未為允戴岷隐曰比天王之命非祭公自為之紀魯甥也咨謀於魯而行此為得情逆后大禮也不言王使又若不為逆后而因來魯之便者士民猶不可况王者乎魯隠不臣而公子翬之難作鄭莊不臣而祭足傅瑕髙渠彌輩弑君更立而不為異所謂下必有甚焉者天道好還即此亦見來戰於郎不受伐也若三國特戰於吾邑而書之云爾猶不虞君之渉吾地也何故同意釋春秋者多知理而不知勢王室僅擁空名而責以不能征討有罪小國危亡無所控訴而責以不能上告天子下告方伯皆是隔靴搔癢胡氏於夫子請討陳恒有先發後聞之論真儒生見解如鄭忽出奔衞經繫鄭於忽意自顯然其不稱子失位故耳其名失地故耳劉氏敞曰貶也逺君子近小人權臣擅命亂鄭者忽論亦過矣忽立未踰年權臣擅命罪在鄭莊而不在忽祭仲髙渠彌之徒大權在握忽能一旦遽収其柄乎祭仲輩即小人之尤而不與忽亦未見其近小人而謂亂鄭者忽所謂寃哉烹也吾以為亂鄭者鄭莊忽特㣲弱且無外援耳程子曰忽以國氏正也此為得之夫人孫於齊呉氏澄謂夫人内慙不安故出奔齊非也夫人果有恥心豈復有禚之㑹祝丘之享乎莊公立已三月為子者未嘗志於復讐為臣者未嘗志於討賊夫人以為是無足難我也故遂如齊特猶未敢顯然行享㑹之禮故謂之奔而書曰孫實即禚與祝丘之始事其惻隠羞惡之心至是盡絶而莊公之不能防閑其母固不必待禚之㑹祝丘之享而責之也賀氏仲軾曰如齊者姜氏之志以為孫者春秋之文斯得其情矣左氏絶不為親與大義滅親二語見為臣者以君為重不當復以弑君之子為子為子者以父為重不得復以弑父之母為母此等處權衡道理輕重透亮斬截使人知身遭大變故雖家庭之間亦有以義掩恩者如此方不為私情所牽而預乎弑逆之罪不稱氏姓貶之也而去姜氏固不足盡貶之之義絶不為親亦不就此見得稱姜氏從齊稱夫人從魯若据絶之之意示貶則當先去其夫人見不得為莊公之母魯之小君而春秋僅去姜氏者若曰姜氏之罪稱之以夫人而益顯且魯之君臣皆夫人之史臣安得不稱夫人惟去姜氏以示小異使讀者推論得之必有深惡痛絶之者此㣲意也此亦姑為之説耳齊襄廹逐紀侯而禮葬伯姬以其為魯女耳時齊魯方交好故以此示德於魯左傳史記杜氏預皆以子糾小白為僖公子穀梁則以為襄公子啖氏助趙氏匡程子胡傳皆從之左氏經文糾稱子諸家史記荀卿並同以為糾兄而小白弟公穀經文則無子字故程氏胡傳以糾為弟今按下文書齊人取子糾殺之則左氏經文當不為誤糾稱子明糾之可立也小白繫齊者小白黨盛而子糾勢孤明小白為齊所與也上稱子糾則齊小白不得與鄭忽曹羈同例何者􅊳與赤并不得書子而糾書子則忽與羈之繫國為順詞而小白之繫國為衆詞此以見魯之終不能納而糾有必殺之勢矣魯莊忘父讐而納其子雖所納正不免於不孝管仲忘君讐而事桓雖其功大不免於不忠不必定為桓兄糾弟曲為之説也殺子糾書齊人并其國人言之見小白之入糾之死皆通國所同也益知齊小白之為衆詞再書子糾貴之也親之也糾如以少奪長與兄爭國則糾固有罪矣何至於其死而専罪齊人且重繋以子哉春秋嘉死節其為君死者必書之如孔父仇牧荀息是也召忽死何以不書子糾未嘗為君召忽雖死其主而於君國社稷無繫焉故不書後人以夫子重子管仲遂并訾召忽所事不正其亦寃矣論功烈則管仲為盛論節義則召忽為正匹夫匹婦之諒未必即貶召忽概言之耳乾時之敗長勺之勝不復父讐而皆以納糾之故所以斥公也凡書來戰者責在外書敗某師及某師戰者責在内而此與公敗宋師於管又不同兵加於已不得已應之非魯之罪兵不厭詐以謀取勝亦不足譏所譏者魯莊既脩甥舅之好援紀而紀滅納糾而糾死以為積弱耳而經書公伐齊則公猶能伐也書公及齊師戰則公猶能戰也書公敗齊師則公猶能敗齊也故詳書之見其非無能為而甘心忘父之讐為大不孝也下書公侵宋公敗宋師於乗丘是内為主之意公敗宋師於鄑又是見其黷武比事觀之義理無盡不可泥煞一例宋人遷宿穀梁云亡詞也啖氏助曰是移其國於國中而為附庸也齊師遷紀郱鄑郚猶未舉全國而遷之故此為遷國之始齊師滅譚為滅國之始是秋荆敗蔡師於莘以蔡侯獻舞歸盖中國自相吞并然後蠻夷得以􅠕夏宿杜注小國東平無鹽縣也今在山東兖州府東平州東二十里盖附屬於魯境者應是宋怨公侵在二月故遷怒而遷宿任宿須句顓臾皆風姓故知是為魯附庸紀侯大去宋人遷宿與滅國無異然猶有畏憚焉故廹而去之遷之至齊師滅譚則悍然無忌盖其聲勢威令足以陵懾諸侯而不敢動故始則滅譚滅遂以示威繼則遷邢存衞以示恩而究之滅國自桓始吞并之禍遂相接跡若邢遷如歸衞國忘亡存亡繼絶嗣者用希則功不贖罪也紀叔姬歸於酅莊十二年春三月賢叔姬也然以叔姬繫紀以酅繋紀叔姬見紀既亡矣而叔姬歸酅是酅在則紀未滅明紀之猶有酅也滅國不見經無可見耳苟有可見雖失其舊封而尚得存其蹤跡春秋未嘗不欲宛轉存之紀叔姬歸於酅是也公羊傳仇牧聞君弑趨而至遇之於門手劍而叱之萬臂摋仇牧碎其首齒著乎門闔是仇牧以捍衞其君死故書太宰督特遇於東宫之西而殺之非以衞君來也督操國重權萬懼討故并殺之耳弑君之賊還為賊殺死其宜矣烏得與牧同書哉卓氏爾康曰削而不書夫子特筆吾謂此非故削之也然使督亦以捍衞君而死夫子必應削何則弑君之惡非可晚盖卓氏論不可非北杏之㑹莊十三年春齊侯稱爵宋邾蔡陳皆稱人以為貶辭楊龜山以為衆與穀梁氏説諸家多從之皆未合劉氏敞謂為大夫是也當時齊桓圖伯諸侯猶未尊齊故桓自主㑹而四國之君不至且㑹以定宋亂而宋首不共故明年之春合陳曹伐宋盖是㑹也桓不得志於是滅遂以示彊盟魯以示信至明年兩伐宋後嗣是於鄄於幽諸侯無敢不自往㑹者矣説春秋自相矛盾如云為賢者諱又云責賢者備畢竟如何説隠公云攝桓公又云簒何者為是桓之伯最遲魯宋乆而後合鄄之㑹乃伯之始一在十四年冬一在十五年春然宋人猶或主兵衞鄭未免復叛其難如此晉文則一戰而伯矣盖桓之時周德雖衰諸侯不復翊戴共主然猶未肯甘心推擁一人聴其指揮號令故合之為難至於文公時諸侯惟彊足庇民者是從習熟見聞以為當然故城濮勝而諸侯宗之所處之時有難易也遂既滅矣猶能殱齊人若因氏領氏工婁氏須遂氏必皆遂之世臣大室藴其忠憤用其智計盡殺戍者以報滅國之讐灰燼之餘尚有生氣齊伐戎莊二十年冬張氏溥以為為魯也去年之冬齊宋陳三國伐魯盖以受鄭詹及公子結遂盟之故至二十二年秋及齊高傒盟於防自是以後納幣觀社公汲汲於合齊而齊顧遲遲焉則此之伐戎非為魯也明矣莊公之婚哀姜也盟防遇榖盟扈屢㑹以要之納幣觀社逆女屢至以求之若惟恐其不得者盖必慕乎哀姜之色也哀姜不傳其美而莊公不傳其好色然為國君者年逾三十而無正配則其多嬖􅃂可知也豈無他族而惟齊女之求既非頼其繋援而其徳復無稱則為其色而已曰制於文姜者非也時文姜已没誰制之而使必於齊乎丹桓宫楹刻桓宫桷説者曰以示孝也或曰以夸大齊女也固皆有之而吾謂此是莊公不能自安良心發見無可奈何而出此也父讐不報復娶讐女以見宗廟秉彛不亡未免􅑶􅘕於是思為盛飾以媚已死之親而逭不孝之罪故丹楹未巳復為刻桷盖天下非禮之事多從自危之心而起郭亡張氏􅄎曰疑即東虢也按公羊傳以虞虢為虞郭則此説可從衞侯朔不書葬魯未㑹葬也賊弟叛臣去葬不足以為討叔姬卒葬皆書以亡國之君之繼室而其歸其卒其葬詳書之是紀之名猶頼叔姬之賢以存執節守禮之效也莊公三十二年中文姜醜行史不絶書文姜死而哀姜入矣然齊有亂倫滅理之文姜而魯有秉節守義之叔姬不以國之存亡易心寄寓困約而不易所守所謂風雨如晦雞鳴不已者也春秋亦詳録之與文姜哀姜事叅觀則勸戒昭矣立㓜君而徐弑之遂開王莽梁冀輩法門故慶父者亂賊之俑也吉禘於莊公非其時非其地先儒論之詳矣喪未三年汲汲若不及待盖殃咎將至哀樂失常簒弑之心無所忌憚而亦有儳焉不終日之勢自為之兆矣故八月而閔公弑九月而夫人孫慶父奔可見亂臣賊子據危地而樂禍不悛者未有不立見潰敗而其決裂未有不甚者也夫人姜氏孫於邾説者謂文姜殺夫罪重故去姜氏哀姜殺子罪輕故不去姜氏非也弑君一耳且預弑二君矣豈應末減其無貶絶盖不待貶也文姜去姜氏不得謂已盡其殺夫之罪哀姜不去姜氏不得謂可寛其殺子之罪凡亂賊之欲簒取大位也雖悍然以為己有然必俟同黨推戴之而後居之不疑若衆心不與而舉朝無一人焉率先諂附猶將徘徊觀望不敢遽取而推戴之者又必為重臣世室朝野之望人所推服者或先以利禄結之否則脅之示之以意令發議在彼簒奪之謀於是乎成如莊公死子般宜立而首發慶父為後之議者叔牙也慶父弑械已成哀姜主乎内叔牙輔乎外季子先酖叔牙則外廷無復推戴慶父者故子般弑而不敢自立閔公弑而仍不敢自立雖有内援而無外助故卒至奔莒使叔牙不死倡議奉慶父而立之諸魯臣未必不從而季子之反國益難矣故叔牙罪未著而遽酖之疑其孟浪然慶父弑兩君而終不敢自為君則由先酖叔牙剪其羽翼也夫人氏之喪至自齊杜氏曰不稱姜闕文也是也以去姜為貶則有不可通者貶當先去夫人不當去姜氏文姜哀姜俱亂魯不絶之於魯而絶之於齊此何意乎孫氏復曰正王法也王法當正其始何始不貶而終貶也蘓氏曰哀姜之死齊既自絶之矣是以不稱姜然則齊襄未嘗誅文姜而亦去姜氏何也夫哀姜為齊桓所誅既伏其罪矣此書喪至書葬乃以見魯人之徇私情而昧於大義而意不主於夫人何必復以氏不氏為嘵嘵哉虞師晉師滅夏陽左氏曰晉里克荀息帥師㑹虞師伐虢是虞實有師也穀梁曰虞無師以其先晉不可以不言師非也春秋紀實之書無但假道而并坐出師之理公子友帥師敗莒師於酈與翬帥師公子慶父帥師有異乎其専一也禄去公室雖自宣公而政逮大夫自隠已然特歴世不久耳季友於魯有大功而季氏之彊權輿於此召陵之師初不足以服楚屈完之詞齊無以對也至甯母之㑹仲諫桓拒子華之謀曰招携以禮懐逺以徳又曰綏之以徳加之以訓辭較伐楚時識見又進可見學問増益雖天下才亦由歴練事多禘於太廟用致夫人秦人來歸僖公成風之襚一不書氏一不書夫人此自有意與文姜哀姜之去姜氏不同盖或稱夫人或稱成風而不全予之者足以見妾之不可為嫡而僖公尊其生母之非若文姜哀姜之去姜氏固不足盡貶意也書夫人風氏薨葬我小君成風則全予之者意已見於前也宰孔言齊侯不務徳而勤逺略先儒疑之是矣且其語亦謬桓之伯正在攘夷狄尊周室伐山戎而却狄盟楚猶憾其不能存邢衞於未亡救弦黄於將滅柰何以勤逺訾之若盟首止於洮於蔡丘不動干戈而定天位惠后叔帶憚而不敢逞此可謂之不務徳乎或如公羊震而矜之之言則有之耳然不足掩其大功也奚齊本非子故不稱子尚未成君故未稱君而亦不書弑而自里克言則固其君之子也故書殺其君之子從里克起義者也穀梁謂國人不子如其意則亦應不君卓柰何又書弑其君卓乎惟家氏鉉翁之説謂奚齊死於喪次君臣之分未定其言得之江黄近楚顧不與楚而服從中國其慕義向善賢於陳蔡逺矣寧受楚伐外無救援效死而弗去此滅國之最善者也時管仲猶在而桓徳已衰楚伐黄狄侵衞皆弗能救於是諸侯知桓之無足恃而縁陵之城救徐之役同㑹解體不復用命甚矣機㑹之不可失也夫人姜氏㑹齊侯於卞習也非禮之事先世行之後人弗怪也齊桓之伯不能使楚弱猶能不使楚强宋襄不成伯適使楚强於中國而驅諸侯從之耳使晉文不興楚伯不待莊矣故宋襄者桓文之罪人也宋襄首伐齊次執滕子次虐鄫子次圍曹其所以求諸侯者如此其暴是以陳假不忘桓徳之説修好諸侯而楚遂參預盟㑹自於齊始楚執宋公而使宜申獻捷脅魯也亦必示以釋宋公之意令魯為之解也故遂有薄之盟公羊傳言公子目夷歸設守械而守國楚人知雖殺宋公猶不得宋國於是釋宋公此即吕甥征繕立圉之意喪君有君敵失所要挾故晉惠宋襄皆復歸國也鹿上及盂公皆不與因來獻捷遂為宋請書曰公㑹諸侯而釋宋公盖以釋宋之權予魯也胡氏曰為魯計者拒其使而不受可也請於天王而討之可也張氏洽曰諸侯若能使宋征繕而脩文告之詞明宋之直正楚之罪則楚人當情屈義愧而歸宋公之不暇矣夫楚之詐而無信豈能自服於義若其强盛則雖齊晉之大桓文之賢用全力而僅勝之魯顧能聲罪致討乎事固有正理如是參以情與勢而有所不能遂當有以曲全之胡氏張氏之説可謂闇於勢者也泓之敗譏其不量力乎則較之於甘心即荆蠻者當逺勝矣謂其不以詐取勝乎又非聖人意也此盖惜之而已非有褒貶圖伯有三䇿勤王也合諸侯也懲荆舒也先勤王而後合諸侯諸侯合而後能懲荆舒桓文雖不同其懲荆舒必在合諸侯之後宋襄於勤王無聞焉徒欲得志於楚以致諸侯其亦傎矣春秋欲褒之則無可褒故不書伐而書戰見非奉辭討罪之師亦不加貶故書宋公宋師見是戰雖敗而敢與虎狼之楚抗衡志猶可取特敗而不復無能爭勝諸侯遂帖然從楚不特為宋惜兼為諸侯惜也狄伐鄭據左氏言則使狄伐鄭者襄王也鄭執王使而受狄師則襄王與鄭不睦可知及頺叔子桃以狄師攻王王復出居於鄭鄭省視官具於汜而後聴政則又若冺然無芥蔕者此亦可疑觀天王出居之事則知首止葵丘之功大矣晉侯納王不書不告也時魯方合於楚而未與晉通故弗告魯圍宋之役僖二十七年冬楚稱人陳蔡鄭許稱爵明其皆君也稱其爵而列之楚人之下其愧甚於稱人不貶而深於貶者也穀梁曰人楚人所以人諸侯也余謂惟不人諸侯益見書法之嚴楚自齊之盟參預夏盟遂憑陵上國宋襄執於盂敗於泓其受挫辱已甚諸侯靡然俯首帖服晉文一出侵曹伐衞獨與楚抗而雪宋恥雖用詭譎亦是兵不厭詐當時楚勢極盛非一戰勝之則楚不戢楚不戢諸侯不服若仗義執言帥兵臨境以伐之又無以保其必勝故以曹衞為囮誘而致之僅乃得志勢亦不得已譬之除虎狼者入山而搏之與設阱而取之但當以入山而搏為正然不必以設阱而取為罪也胡氏於侵曹伐衞則斥其報怨城濮之戰則斥其詭譎斯亦固矣公子買戍衞不卒戍刺之左氏所記深得魯之情矣但在傳則以不卒戍為買罪案在經則紀實而已買戍衛而晉伐衞卒戍則抗晉楚復救衞不卒戍則恕楚故不令卒戍而刺之經固非以不卒戍屬買也若曰既使之戍又不使卒戍見買之無罪云爾楚人救衞惡楚也胡氏以為譏晉此等處最謬曹衞親夷狄而疎中夏晉伐之為伯討何譏之有齊桓時楚雖强而未盛故召陵之師緩晉文時楚已幾幾更伯主盟矣故城濮之師急齊桓時惟蔡鄭與楚而江黄及徐尚有從齊者故可整兵相向至文公則宋齊兩國外皆服屬楚故必致楚來戰然後能勝之時勢不同也晉文定伯甚驟五年身死然子孫常為盟主桓公積累數十年得之而一敗塗地盖桓公單恃一管仲而文公所用謀臣力士多文公雖死而狐趙先郤輩猶在故伯業不衰可見賢才多則氣脈長少則氣脈促伯佐尚然王佐又當何如踐土之盟王自往也河陽之狩晉召之也惟天子可以親勞諸侯故諸侯可以上召天子上輕故下慢得臣之殺説春秋者多責楚子得臣自應殺喪師辱國所謂謀人軍師敗則死之未為失郉也得臣不忍於蒍賈之一言而憤兵致敗藉使楚復用之必刻刻不忘城濮之役兵連禍結數世未已故得臣死而晉楚皆得息肩此殺不為無功也或謂楚成不如秦穆不知秦意止於報晉楚兼欲爭諸侯得臣必不能如孟明増脩其徳而殘民以逞當較彭衙及晉更甚焉楚成毅然殺得臣而不復報晉怨其懲忿而自克固勝於秦繆矣晉襄初立敗秦敗狄是繼伯大闗要大夫特㑹諸侯自公孫敖㑹晉侯於戚始而敖固慶父之子也孟氏之專始於敖叔孫之專始於兹而盛於得臣彭生季孫之專始於友而盛於行父敖㑹在文元年及晉處父盟去氏書名使若㣲者以厭之也處父非敢伉晉侯使之於處父無責焉孔氏頴達曰惡處父也非也内大夫出盟諸侯自柔於折始桓十一年嗣是則公子結之於鄄莊十九年然齊宋猶以不恭為討至文公時則公孫敖專㑹晉侯矣又㑹三國矣垂隴以大夫主盟是尊其大夫而卑諸侯不知政之遂移於大夫也洮之盟王人與焉葵丘之㑹宰周公與焉然猶以諸侯㑹也翟泉之盟則以列國大夫與王臣盟天子輕而諸侯重諸侯輕而大夫重世變代降如此然皆齊桓之後丁丑文二年二月作僖公主特書之為逆祀并書也喪主於虞虞主用桑宜五月作吉主於練練主用栗宜十三月虞主埋之吉主刻而謐之藏於廟室常所當奉祀也練而易主是時僖公薨已十五月練不易主而今始作之慢也殷既練而祔周卒哭而祔祔與練祭於廟祭訖主反於寢三年喪畢遭烝嘗乃於廟今纔二十一月未大祥而吉祭亟也比而觀之過期與不及期均為不時而逆祀非禮又其顯然者矣晉陽處父帥師伐楚以救江大書特書非貶詞也但當比事觀之是冬救江文三年而四年秋書楚人滅江則其伐固不足以懲楚而其救固不足以存江也汪氏克寛謂責處父不能伐楚救江而特起伐以救之文以罪之春秋豈有無事而起其文者哉二年冬伐秦則人之秦伐晉亦人之皆貶之詞四年冬伐秦書晉侯者記襄公親行耳書人書爵有不足盡褒貶者錫桓公命歸含且賵㑹葬王不稱天遂以為貶夫榮叔歸賵與宰咺歸賵其為厚禮妾母無以異而隠元年未嘗不稱天也王必稱天尊之至故求之備何必去天以示貶乎春秋尊王而敢貶黜天王必無是理大夫專盟自公子遂㑹晉趙盾盟於衡雍始文公八年李氏亷謂内大夫特㑹外大夫五㑹郤缺承筐髙固無婁荀首於穀士匄於柯荀躒適歴者非也大夫主盟諸侯自公孫敖㑹宋公陳侯鄭伯晉士縠盟於垂隴始文公二年許氏翰謂大夫主盟諸侯自扈之㑹始文公七年亦非也公孫敖如京師不至而復公子遂如齊至黄乃復君命不行縱恣無上可見矣先都士縠箕鄭父皆稱人以殺三人皆有應殺之罪故稱人為討罪之辭而討罪不出於君則兼有擅殺之意穀梁胡氏説當並存逆婦姜於齊稱婦姜者姑在之詞非禮成於齊之謂也遂以夫人婦姜至自齊亦可云以成禮於齊便稱婦耶不稱夫人不書至盖是文公不重大婚夫人之禮有不備故其詞輕簡後書夫人姜氏如齊書至自齊既告行告至則謹書之矣以為喪中納幣成禮婦家聖人惡之而變其文者大謬世室壊屋曰不共曰不脩皆是此非天災神怒也直傾頺耳程子以為變髙氏閌以為自壊失經㫖矣外臣來盟不稱使者其來君使之盟非君使之屈完之來盟不盟未可定也髙子之來所以伺魯若華孫之來安知其非有所窺偵乎子哀來奔魯方受之君無專命而臣以權宜定盟故不稱使特結盟尚屬脩睦之事是以無貶詞子卒不書弑史臣曲筆也夫子因之盖宣公時君之祖考前史諱之而自我暴之則不可陳氏傅良曰惡位未定則其稱子卒何成之為在喪之君也此不然莊公八月薨子般十月弑已稱子矣喪必有主君薨嗣子之位先定豈有距公薨八月且已葬而位猶未定者哉惡為在喪之君無可疑者仲遂弑赤遲至八月而後發者懼外之無援而諸臣不與也至得臣同使則叔孫氏與之矣孟氏則文伯惠叔未秉政而季氏則行父與之矣外則齊又與之矣是以弑赤而不忌其初尚顧望未敢動也慶父内外無助發之又速故季友得成反正之功仲遂布置既定發之遲而宣公之位安仲遂居然令終矣子卒不日不知其日也曷為不知其日諱而不紀也子般何以書日曰世愈近諱愈深惠伯不與乎弑故仲遂必殺之雖非扞君而死然終是為君死難張氏洽以春秋不書反責以不能扶持之罪非通論也莒僕來奔季文子使司寇出諸竟其使太史克對曰見無禮於君者若鷹鸇之逐鳥雀不知身為大臣而預乎弑逆且為之納賂請平者將謂之有禮乎無禮乎其祖鴆叔牙誅慶父而行父黨於仲遂是不忠不孝之尤者何乃責莒僕哉庶其宻州之弑傳皆謂因國人以弑讀者疑之呉氏澂謂國人下以字當作之字卓氏爾康謂以通作已皆國人弑之之詞然襄三十一年以為傳誤猶可若庶其之弑傳中載季文子語明言今莒僕則其孝敬則弑君父矣傳中以字豈可改哉春秋隨筆卷上
