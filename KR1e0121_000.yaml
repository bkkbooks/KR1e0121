body:
  text: 春秋隨筆春秋類提要臣等謹案春秋隨筆二卷國朝顧奎光撰奎光字星五無錫人官瀘溪縣知縣是編不載經文但偶有所得則録之故名隨筆其中如桓公㑹稷以成宋亂成自訓平其下取鼎納廟之事所謂美始而惡終也而奎光以為成就其亂春秋諱國惡二百四十年中無此徑遂之筆也公子翬之寵自以翼戴之故華氏之立自以賂故兩不相謀而奎光謂立華氏為翬之私華氏立而翬遂命為公子夫國君樹其私人豈必援鄰國之例不立華氏翬將終身不命乎鄭滅虢檜晉滅衛霍其事舊矣而奎光謂滅國自齊桓始何不考也紀叔姬歸於酅自重叔姬之節而奎光謂以酅存紀是泥於陳滅書陳災之傳莊公之娶哀姜奎光謂因其色美已為臆度之詞而又謂莊公不聞好色彼築臺以臨黨氏割臂以盟孟任非好色之明證歟公子友敗莒於酈奎光以為與翬帥師慶父帥師其専相等此無論莒人責賂利兵而來居於必應之勢非出軍疆外者比且核以傳文絶無専行之證何所據而斷非君命也子卒不書弒自與隱公不書弒一例而奎光以為史臣之曲筆豈春秋亦曲筆乎敬嬴雨不克葬自是適值其時公羊以為咎已出附㑹而奎光乃借以明天道豈弒逆者葬必遇雨耶且春秋以褒貶為賞罰不以果報為勸戒此非經義也如斯之類瑕纇蓋所不免至其謂春秋例從義起非義從例生謂春秋有逹例有特筆然亦須理㑹大處不可苛刻繳繞謂春秋時天子僅守府小國亦失職說者乃於小國見伐責其不告不足以服其心謂春秋將以治世之無王者而胡氏於宰咺歸賵則曰貶而書名於榮叔歸含及賵則曰王不稱天如此則無王自春秋始矣謂說春秋者自相矛盾既曰為賢者諱又曰責賢者備既曰隱公為攝又曰桓公為篡何者為是其論皆深中說春秋者苛刻迂謬之弊故其所論多平允近於事理頗能得筆削之㫖奎光嘗撰然疑録所載說春秋諸條與此相同其為先有此本又編於然疑録中或先載録中又摘出别為此本均不可考然然疑録頗為瑣雜論其菁華則已盡此兩卷中矣乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
