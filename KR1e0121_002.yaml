body:
  text: 春秋隨筆卷下瀘溪縣知縣顧奎光撰桓宣繼弒而書即位者外援既定內位既固從容成禮無復危疑畏憚之心可以見亂賊之得志也桓公元年三月公㑹鄭伯於垂即書鄭伯以璧假許田所以結鄭也宣公元年夏書公㑹齊侯於平州公子遂如齊即書齊人取濟西田所以賂齊也此與㑹於稷以成宋亂取郜大鼎於宋皆同蓋亂賊所畏不在强大而在無欲晉趙盾帥師救陳下書宋公陳侯衛侯曹伯㑹晉師於棐林伐鄭言伐鄭故書㑹晉師而趙盾已見於上文不必復書趙盾文自簡明謹禮於微諸說俱可不必晉雖大國獨當一楚猶或不敵復加以秦則晉不支矣故晉與秦合而楚敗楚與秦合而晉敗殽之後秦晉報復紛然自是晉之全力在秦而不在楚至楚人滅庸而秦楚之交合矣趙穿侵崇求成益為失䇿不能合秦以拒楚而怒秦以資楚舛矣經不書師敗績而書獲其君與將者韓原之獲晉侯鄭獲蔡公子燮蓋君與將雖見獲而師徒不至大崩也其書敗其師而獲君與將者以蔡侯獻舞歸獲莒拿獲宋華元獲陳夏齧獲齊國書皆師先敗而君將復見獲者也或疑豈有君將見獲而師徒不至大崩者不知韓之戰晉戎馬還濘而止是以見獲而秦伯亦幾為晉止為慶鄭所誤耳是晉侯雖獲而師未動也傳叙城濮之戰楚惟中軍不敗邲之戰晉惟下軍獲全始書敗績則知書敗與否皆據實而言但君將見獲敗亦可想見矣趙盾舍靈公而欲立公子雍秉國者如此便是大事糊塗令狐以後秦晉之搆兵盾為之也其郉政偏頗絶無執守內不得於君而外不競於敵三傳所紀如鉏麑彌明靈輒等事人艷稱之吾謂厚施養士使君側左右皆為之死黨後來游俠氣習已開於此桃園之賊即趙氏羽翼穿特為之首耳盾於趙穿曲徇其意正欲得其死力如求成於秦而反伐其與國秦非畏晉者安得成盾非不知此以穿欲得兵柄故遂使之侵鄭之役合諸侯之師力非不足而去之亦緣君臣相圖意不在鄭弒械於此成矣其亡也以君委穿而已且中立不成則奔成則復穿愚而盾巧矣亡不越竟而非謂越竟討賊遂可免罪即使盾歸罪於穿執而戮之終無以自解劉氏敞謂盾之免與不免在乎討與不討而不在越與不越此未是司馬昭即斬賈充亦何以謝天下何况成濟魯宣繼弒齊惠亦繼弒故宣之立不事晉而事齊鄭襄繼弒晉成亦繼弒故襄之立不附楚而附晉所謂同惡相濟齊侯止公以叔姬免五年春晉侯止公以賂免魯本望國至是辱甚矣黑壤之盟在七年冬仲遂之卒上書公子下書氏及名互詳之也春秋未嘗貶曷為不貶遂之惡無待於貶也弒君大惡天地所不容載非文字間貶斥得蔽其辜故文姜哀姜猶稱夫人小君慶父仲遂猶稱公子正欲天下後世見其為夫人公子罪乃益重若不書與常人等耳文姜孫齊不書姜氏哀姜喪歸不書姜恐是遺闕姑為說之耳葬我小君敬嬴雨不克葬胡傳曰著咎徴焉此說為勝潦車載蓑笠士猶備之豈有葬君母而無備者宣公親母且由以得立未必苟簡從事不克葬則雨甚矣弒君逐嫡而居然正夫人之位生榮死哀豈復有天道乎雨甚水至踰時淹日不能成禮亦足覘天人之理矣宣公三年楚侵鄭書人四年伐鄭書爵胡氏曰與之也歸生有可討之罪而楚非討罪之師春秋安得與之乎五年伐鄭書人九年伐鄭又書爵胡氏曰下書晉卻缺帥師救鄭則知其非與之然則四年伐鄭果可為與乎吾謂楚之伐鄭皆非豫詞君行則書爵大夫行則稱人耳若晉郤缺帥師救鄭與陽處父帥師伐楚以救江同意有救之名無救之實力不足畏德不足懷救江而江滅救鄭而鄭叛猶之弗救而已春秋憤楚之憑陵而書救以解嘲耳故十年楚伐鄭士㑹之救遂不書蓋謂晉救不足為有無也楚人殺陳夏徴舒豫楚也合下入陳納孔寧儀行父二事觀之固未嘗以討賊豫楚蓋自徴舒言之則弒君之賊雖蠻夷戎狄亦得明正其罪而又傷王法之不申伯威之不競此書殺徴舒意也自楚言之則既有利心復納亂臣以間之若正本清源二人當與徴舒同辟一殺一納於義安居書入書納可見楚之非伯討矣左氏叙邲之戰說楚之所以勝在晉人口中叙出晉之所以敗在楚人口中叙出其叙楚之勝在楚之不欲戰處見之叙晉之敗在晉之或欲戰或不欲戰處見之不必看到交鋒接創己自勝負燎然晉殺其大夫先縠不正其邲之罪而加以召狄者何也桓子請死而士貞子救之若趙穿魏錡皆無討焉則無辭以誅縠故置邲事不問而以召狄中之可見縠之剛愎不容於晉矣宋人及楚人平宣十五年夏左傳言華元夜入楚師登子反之牀而起之子反懼與之盟而告王公羊言司馬子反乘堙而窺宋城宋華元亦乘堙而出見之二傳不同公羊語為可信子反為大將軍中守備護衛必然嚴密何以夜入登牀如無人焉果爾則必如後世劍俠之術也異矣春秋書饑書有年重民命也桓宣書有年說者胡氏孫氏以為不宜有夫其君是惡其民何罪此正見天心之仁愛耳復何異乎汪氏克寬曰幸其僅有年也得之矣親戚間財帛交際若我貧彼富不可不分明我富彼貧又太分明不得錙銖計較縱是分所應得亦能致怨宣十四年秋九月楚子圍宋至十五年五月而後宋及楚平其服宋也可謂難矣宋人告急晉安得不救而伯宗之言曰天方授楚未可與爭雖晉之强能違天乎諺曰髙下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢君其待之晉本畏楚而伯宗復以此言佐之晉益不振矣楚雖强而頓兵堅城之下已踰半載師老財匱勢如弩末使晉救之未必不退而包羞忍恥不敢出師順天者存果如是乎書宋人及楚人平所以傷中夏之無盟主而譏晉也說春秋者乃以専政擅名罪華元子反豈識輕重哉楚圍宋而晉不救於是宋未下而魯先降矣十五年春公孫歸父㑹楚子於宋使晉能救宋魯猶有所恃也孟獻子謀魯薦賄以求免其恇懦無䇿與伯宗同而一則以禮意文之一則以天意諉之故謀國者論時勢不容以盛衰强弱委之天意而不知自强論道理又不可珠玉皮幣之事為以小事大之禮後世若漢唐之和親宋之嵗幣孟獻子之故智也宋之偏安伯宗之故智也二人言皆可聽而誤國不小斷道之盟宣十七年五國之君皆在故書爵非豫之而貴之也外楚既無事實謀齊亦出私憤何豫之而貴之有豫之趙氏鵬飛說貴之家氏鉉翁說宣公即位以來事齊甚至末年乃謀伐之必不堪其誅求也依人自立者必受其敝以力服人者必反為讐石晉之於契丹亦猶是矣宣公弒立而叔肸非之織屨而食終身不食宣公之祿與之財則曰我足矣穀梁以為通恩胡氏以為明親親厲不軌其賢於春秋宜也書字必賜氏也胡氏以不用事不見經為疑非也不食其食矣其不用事可知也賜氏自是宣公之恩叔肸有不得而辝者未有君不賜氏春秋賢之而特加以字者也叔肸以加字為賢則仲遂當去字為貶遂不可去字則肸亦不可加故斷其為宣公賜也魯肸衛鱄皆公弟之賢者衛獻無信故去之魯宣有恩故留之所遇異也楊氏士勛以春秋字肸而名鱄强分優劣非是然則仲遂亦字謂遂賢於鱄可乎楚子旅書卒不書葬公羊以為辟其號是也孫氏復曰貶之也春秋於列國之君不備禮不書葬不往㑹不書葬皆非貶詞如貶之則於吳楚并不書卒可矣何獨不書其葬哉宣公薨而歸父逐榖梁曰捐殯而奔其父之使者是亦奔父也胡氏曰罪成公君臣死君而忘父逐之亟也論固正矣然使舊主耄昏奸權擅柄新君嗣政大憝不除而執三年無改之說襲其粃政用其私人因循而莫敢動何以明賞罰而新號令若歸父則固不必逐而逐之若是亟者以欲去三桓之怨也行父始不能治仲遂之惡而比之繼不能忍歸父之怨而逐之則是為死君而已矣鞍之戰成公二年四卿並將掃境興師大夫氣熖赫然而公室微矣然亦不獨魯也戰鞍之後即為袁婁之盟征伐者大夫㑹盟者亦大夫雖其來有漸而是役實一大關目也自鞍以後六年侵宋則仲孫蔑叔孫僑如昭公十年伐莒則季孫意如叔弓仲孫貜定公八年侵衛則季孫斯仲孫何忌哀公二年伐邾則季孫斯叔孫州仇仲孫何忌而鞍之役尚有臧孫許公孫嬰齊伐莒之役尚有叔弓餘則無非三家者故大夫擅兵自翬帥師而已然若兵柄悉屬三家則自此始耳成公以前民猶公家之民兵猶公家之兵故師則命帥將必屬卿至是則各自為帥有専屬而無兼統故分則獨出合則並出然三家之中季孫為主後此書並將無有不合季孫者惟六年侵宋不預耳陽橋之役王卒盡行楚以衆勝而晉亦辟之故侵衛書師盟蜀書人皆著其衆也人楚故並列國之卿人之又以見服從楚者衆也中書公㑹楚公子嬰齊於蜀見侵衛盟蜀者為嬰齊也非貶詞蓋不待貶耳三年伐鄭晉宋衛曹並書爵則以其君自行亦非豫詞夫冬盟蜀則即楚而背晉在十一月春伐鄭則即晉而背楚正月反覆無常二三其德難乎其立國矣屢書公而不諱亦危之也郯伯姬來歸杞叔姬來歸皆見出也雖未審其事然為不安於國則同叔姬之歸杞伯先來朝而後復逆其喪者杞素畏魯故未敢决絶耳未見叔姬之優於伯姬也蟲牢之盟左氏曰鄭服也鄭以訟許不勝急而求合非力屈而服非心悅而服雖汲汲為此盟而必不能固矣吳伐郯成公七年春家氏鉉翁曰貴郯而賤吳也夫吳為太伯之後而周章武王所封何賤焉孫氏復曰惡其僣號也是時楚僣王號方主夏盟春秋書子書卒業已與諸夏同何獨惡吳之僣號其書國者始通上國猶略之之詞逮盟㑹漸數故至襄五年於戚則書吳人襄十年書吳子卒則詳之矣楚見於經始亦稱荆莊公十年九月書荆敗蔡師於莘至莊公二十三年書荆人僖元年書楚人四年書楚屈完二十一年書楚子亦漸詳之也蠻夷漸盛交於諸夏而無攘却之者聖人憂而傷之則有之矣若曰書國書人皆為惡斥之詞則其强盛之時尤當痛絶不應嚴於前而恕於後也以書國為賤以書爵為貴則盂之㑹黃池之㑹可謂貴之乎吳與楚敵已久蠻夷自相攻伐聖人弗責也至是則兵連上國矣故以伐郯始猶楚之見經以敗蔡師於莘始也易首乾坤詩始關雎書重釐降禮謹大昏春秋為國史於男女夫婦之間未嘗不反覆致意以其為人倫之始也故於納幣親迎致女逆女來媵來歸苟非得禮為常事莫不悉書於大美大惡則尤言重詞復不厭其詳於文姜則詳之㑹禚亨祝丘之類志淫也於哀姜則詳之納幣觀社遇榖盟扈之類志亂也內女之賢詳書之者紀叔姬媵也而書歸書卒書葬宋伯姬尤詳凡七見經皆以其守貞而全義也此不特見史法詳略之宜而聖人重男女夫婦之節亦顯然矣孔氏穎達云史稱有屠岸賈者有寵於靈公此時為司寇追論趙盾弒君之事誅趙氏殺趙朔趙同趙括而滅其族案三年傳欒書將下軍則於時朔已死矣同括為莊姬所譛此年見殺成公八年趙朔不得與同括俱死也於時晉君明諸臣强無容有屠岸賈輒厠其間得如此専恣又說云公孫杵臼取他兒代武死程嬰匿武於山中居十五年因晉侯有疾韓厥乃請立武為趙氏後與左傳背違馬遷妄說不可從也汪克寬氏曰史記稱屠岸賈誅趙氏殺趙朔趙同趙括趙嬰皆滅其族而春秋止書殺同括不書殺朔嬰則不惟與傳抵牾亦且與經相戾此据經駁史尤無可疑左氏於趙氏事如鉏麑提彌明靈輒輩皆記之豈有杵臼程嬰所為略不一及而其事又非尋常不容泯泯反覆核之史所言恐無稽也使召伯來錫公命稱天子益知天王之稱王非貶詞也孔氏穎達曰稱天王者二十五稱王者六稱天子者一王稱竝行傳無異說故知天子天王王者之通稱也生而賜氏者三季友仲遂叔肸也以父字為氏者一仲嬰齊也皆變禮故書之晉侯執曹伯歸之於京師書爵者書其歸京師為天討也雖伯主必能尊王而後可以討罪晉侯是舉能正已矣負芻弒立稽三載而執之則緩列之㑹而執之則譎春秋善善從長無不足之詞蓋初時諸侯請討晉以伐秦為勞請俟他年此與之㑹負芻不敢不至因而執之則不興師旅罪人斯得皆有息民之意焉此春秋之所恕也公如京師成十三年三月因伐秦也不書朝王必其不成朝王之禮也宣伯欲賜請先使王以行人之禮禮焉孟獻子從王以為介而重賄之是時凌替已甚更不如河陽踐土時矣王待諸侯之臣若此則諸侯可知當時局景豈特下堂而已若使朝王成禮雖以他事至而存之二百四十年以志餼羊之意未必非春秋所樂書也故傳言朝王而經不書子魚讓宋襄公子西讓楚昭王子良讓鄭襄公子臧讓負芻季札讓僚及光皆能敝屣千乘者而子臧季札尤稱其賢然較爭奪篡弒之人雖過百倍而反使爭奪篡弒者偃然得志君父大讐不復關念惟知歸潔其身非聖賢所許也晉人執負芻將見子臧于王而立之其將亡也國人皆將從之外為大國所與內為國人所歸而不能正負芻之罪是其守節適以成就亂賊而已魯兩嬰齊仲嬰齊仲遂子也公孫嬰齊叔肸子也叔老叔弓叔輒叔鞅始以叔為氏而嬰齊稱公孫故知以王父字為氏者正也仲嬰齊其變也鍾離㑹吳通吳以牽楚也范文子其大臣乎憂深而慮逺伐鄭之役成十六年則曰若逞吾願諸侯皆叛晉可以逞若惟鄭叛晉國之憂可立俟也蓋逆知必有楚師矣及戰於鄢陵則曰夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣又曰惟聖人內外無患自非聖人外寧必有內憂盍釋楚以為外懼乎鄢陵之反至於祈死而死蓋厲公之侈欒郤之不協外嬖與諸大夫之相爭勢必作難而又勝楚以益其疾故鄢陵之勝晉君臣之禍也孟子曰入則無法家拂士出則無敵國外患者國恆亡春秋諸臣惟文子知此意賢哉榖梁曰四體偏斷曰敗此言敗則目也其說固矣春秋書敗績者其君皆折肱傷股乎伐鄭之役王臣始㑹伐成十六年秋自尹子而後以諸侯用王師而王臣奔走與諸國大夫無異此又一變也非挾天子以令諸侯乃挾諸侯以令天子矣髙氏閌謂其扶義以令天下豈不謬哉王臣㑹伐自劉康公成肅公從伐秦始至尹武公同伐鄭經始書之繼是復伐鄭則尹單二公并預柯陵之盟㰱血要言王官與列卿夷矣然首止葵丘㑹而不盟翟泉為盟之始此則㑹伐而同盟之始僖公八年洮之盟王人與焉微者也且王室有難故無譏焉晉弒其君州蒲稱國以弒不得其主名也或本國史官書之或魯史書之則聖人因之否則不得而懸坐也董狐南史所以可貴行父亂賊之尤也妾不衣帛馬不食粟小善耳豈足掩其夫惡哉仲遂弒君而人謂之賊行父與於弒君而人謂之忠欺世盜名又甚於遂矣簡王崩於九月辛酉訃告未及邾子之朝晉衛之聘皆無貶焉此亦幸耳當時諸侯即訃告已及亦豈能因聞喪而輟朝聘哉楊氏士勛謂魯是有禮之國焉得受之不知魯非昔日之魯春秋時天王之待魯為最殷勤而魯之事天子極偃蹇落穆特較之射王中肩首犯不韙者稍愈耳孔氏穎達曰經云六月庚辰鄭伯睔卒傳言七月庚辰鄭伯睔卒杜以長歷校之此年六月壬寅朔其月無庚辰七月壬申朔九日得庚辰則傳與歷合知傳是而經誤也經在當時日月不應誤意是傳寫訛耳其它殘脫舛漏亦不能無讀經者不可概忽為傳疑亦不可强生别解也遂城虎牢扼吭拊背得地利之勝者也然悼公即位諸侯大睦故能逼鄭以制楚蓋先得人和矣襄四年公如晉請屬鄫晉侯許之五年穆叔覿鄫世子巫於晉九月穆叔以屬鄫為不利使鄫大夫聽命於㑹六年莒人滅鄫魯既屬鄫而不能庇故晉人以為討春秋鄫極微弱宋人用之邾人戕之其受凌虐亦無如鄫者至是見滅於莒非必如榖梁立異姓以蒞祭祀之說也小國互相并吞而大國莫正其罪利其賂則請為屬不利則聽其亡魯豈有字小之義乎晉不討莒而討魯未為偏也季友賜費在僖元年至襄七年南遺為宰始城費自後南蒯以費叛昭十二年弗狃以費叛定八年至定十二年墮之大夫方張陪臣繼叛此天道也晉欒書中行偃弒君而書晉弒則漏其主名矣然猶知其為弒也鄭公子騑弒君而以瘧疾赴竟若非弒者然亂賊益巧而史益無直筆矣初稅畝宣十五年始征私田也用田賦哀十二年則又加征矣公田之法什取其一今又履其餘畝復什收其一杜氏預說合於哀公二猶不足之言故朱子從之榖梁曰非公之去公田而履畝十取一也是尚未至什而取二故杜說為長已為什而取二至哀公託名軍用加斂於田數之多寡不可知要之又多於稅畝矣古者田出租里出賦賦之本義専為出軍租取民財田主供之賦取民力商賈之里㕓供之國語孔子對冉有之言曰先王制土籍田以力而砥其逺邇賦里以入而量其有無任力以夫而議其老幼於是乎有鰥寡孤疾有軍旅之出則征之無則已其嵗收田一井出稯禾六百四十斛秉芻二百四十斗出米十六斗不過是也先王以為足胡傳取國語謂田以出粟為主而足食賦以出軍為主而足兵弛力薄征當以農民為急而增賦竭作不使末業者獨幸而免也觀此則用田賦者乃令出粟者復出軍既失重本抑末之意而更假軍旅之名為聚斂之實不過加征以足用耳吕大圭曰陳君舉謂以丘賦為未足又以田賦之田賦之者家一人以為兵也然九夫為井六十四井為甸甸出革車一乘則是五百七十六夫而出七十五人今几受田者皆出兵一人比古七倍恐加兵不至如是之甚賈逵以為周制十六井賦戎馬一匹牛三頭今使一井之田出十六井之賦是多於常賦十六倍於理亦未然論語有哀公問有若之言是舉宜出於哀公然自襄十一年作三軍而民之屬公者僅十二分中之五至昭五年舍中軍公室無復有民矣此雖哀公之意亦三家為之故季氏使冉求訪於孔子可見哀公不得而為主也初稅畝首壞田制也作丘甲首壞軍制也至用田賦則田制軍制俱亂矣於倍征後加征是亂田制令出粟者出兵是亂軍制六書故上取諸下曰賦禹貢厥賦惟上上錯注賦謂土地所生以供天子周禮以九賦斂財賄太宰八則五曰賦貢注曰率出泉也貢功也九職之功所稅也是租亦云賦故曰賦稅而計口率泉乃屬兵賦周禮辨其夫家之衆寡與其可任者國中自七尺以及六十野自六尺以及六十有五皆征之即漢之口賦也左傳言悉索敝賦則以兵為賦漢郉法志畿方千里有稅有賦稅以足食賦以足兵始分賦稅為二矣九夫為井四井為邑四邑為丘一百四十四夫四丘為甸五百七十六夫甸地方八里旁加一里為成一成之賦長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人二十五人為一甲積四丘而具一乘每丘出十有八人耳作丘甲則使一丘出一甲士二十四步卒而長轂牛馬之數亦加四之一是每甸增一甲也杜民謂使丘出一甸之賦太過此與用田賦不同作丘甲専為益兵而用田賦乃是加征耳九夫為井實則八家蓋去公田百畝矣一丘止應一百二十八家也稅畝在宣公十五年丘甲在成元年踰三年耳變亂先王成法自其君始而其臣遂無顧忌矣成法既壞則由是而作三軍舍中軍無所不可故公室之分宣公先啓之也魯本有三軍而此言作者分公室之始也専擅改作不足責而弱公强私之罪大始則三分其民三家各得其一繼則四分其民季氏獨得其二故作三軍而三家並强舍中軍而季氏獨强邢丘之㑹襄八年命朝聘之數也大夫聽命已為過矣况諸侯乎胡氏曰朝聘事之大者而使大夫聽命無乃以姑息愛人而不由德乎是不知晉命朝聘之數為以天子自居而欲使諸侯親自俯首於壇坫之下以成其僣妄也榖梁曰見魯之失正也不知此正以公不與㑹稍為得體以為失政非也陳氏傅良曰大夫不書尊晉侯也亦無此意伯主尊大自為典制彼不尊周室春秋何為獨尊晉侯哉晉侯親發命鄭伯親聽命則書晉侯鄭伯而已無所庸其尊髙厚向戍輩知有伯主不知有天子奉命惟謹微之則書人而已亦無所庸其貶溴梁之㑹襄十六年髙厚歌詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸大夫遂自盟是大夫之盟固有君命矣孔氏穎逹云君使之盟非自専也髙厚是大夫盟髙厚故使大夫無諸侯盟大夫之禮公榖胡氏皆以為諸侯失政大夫不臣殆未考本事政在大夫豈自今日始哉悼公三駕襄十年秋戍鄭虎牢一也十一年秋同盟於亳城北二也九月㑹於蕭魚三也三駕而後得鄭諸侯之勞肄亦甚矣盟則不如召陵戰則不如城濮其得計者在城虎牢以逼鄭而通吳以牽楚故鄭服而楚亦不爭其不與楚戰終是畏楚之意多以為疲楚者非也吳子壽夢卒臨於周廟禮也凡諸侯之喪異姓臨於外同姓於宗廟同宗於祖廟同族於禰廟是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨於周公之廟是則傳所言周廟者宗廟也文王廟也周公之廟者祖廟也諸侯不敢祖天子而有文王廟非禮也杜氏諤曰宣十八年録楚子旅卒者甚其暴盛此書吳子乘即壽夢卒亦以其暴盛此說無理國君薨卒來赴告則書之否則不書此常例也若云甚其暴盛則春秋書卒如杞邾莒之君亦書豈有暴盛意乎盟㑹侵伐其暴盛於生時為甚何反於書卒而見之乎襄十三年春公至自晉傳云孟獻子書勞於廟禮也桓二年傳曰凡公行告於宗廟反行至舍爵䇿勛焉公之如晉也以朝且拜士魴之辱其事伯主卑恭已極告事而已何勞可書而謂之禮乎長樗之盟孟獻子相襄三年夏公稽首知武子曰天子在而君辱稽首寡君懼矣恭不近禮識者非之獻子有賢德而不知事大之禮使其君屈體强大僕僕道途又自以為功可謂無恥矣晉侯搜於綿上以治兵士丐讓荀偃韓起讓趙武欒黶讓韓起傳言晉國之民是以大和諸侯遂睦其事在襄十三年至十四年春㑹於向將執戎子駒支范宣子親數諸朝則云今諸侯之事我寡君不如昔者是與諸侯遂睦之語相背矣及夏伐秦之役荀偃欲戰欒黶徑歸而欒針死士鞅逐其不和如此一年之間事語不相應自為矛盾左氏可盡信乎衛侯出奔齊以臣逐君不可訓也故失國而不名晉為伯主當正林父之罪而納衛侯乃聽師曠荀偃之言反助林父而立剽政郉既失則齊人之二正不在假羽毛而弗歸也師曠之言似識道理荀偃之言似識時勢此謂巧言亂德襄十九年八月仲孫蔑卒而二十年正月仲孫速㑹莒人盟於向二十三年秋仲孫速卒而二十四年春仲孫羯帥師侵齊此不行三年喪之始季武子廢彌公鉏立紇悼子而公鉏即為仲孫廢秩立羯武子明知秩長當立而無以答公鉏故曰身不行道不行於妻子邾庶其以漆閭丘來奔啖氏曰不言叛為內諱也非也叛者從其國言之如衛孫林父宋華亥宋弟辰晉趙鞅等是也書來奔者詞繫於魯而不繫於邾何由書叛經書三叛人襄二十年邾庶其昭五年莒牟夷三十一年邾黑肱皆季氏為逋逃之主而公不在國也季氏外倚强臣內受叛臣所謂同惡相濟莊公之弒晏嬰不死其言曰君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私昵誰敢任之此賈舉州綽之徒所以不得為死節也然身為大臣於君之失德無諫諍之節君之臨危無捍衛之謀及君既死不能討賊復不能潔身而去徒以嬰言為貪生苟免之計則害義矣宋公殺其世子痤襄二十六年秋讒痤者伊戾也殺痤者向戌也大臣不賢女寺得計能使人君父子不能相保而無敢明白其事者江充之讒戾太子使為宰相者能持重而以田千秋之告武帝者入奏帝未必不悟乃倉黃發兵至於兩敗張九齡去而太子瑛死李泌在而廣寧王安由是觀大臣之係於國家豈淺鮮哉向戌以弭兵為名而晉楚之從交相見自此南北兩伯而中夏諸侯皆南面朝楚乃東西並帝之權輿也故宋之㑹為春秋一大關鍵襄二十七年夏向戌之弭兵又即戰國合縱之始也但此主通和彼主拒秦耳其游說列國頗類蘇秦宋之盟成於二十七年之秋至明年而宋鄭陳許皆旅見於楚公留楚七月至使親禭見辱如此謂非向戌之罪乎然晉已不競無能庇諸侯其折而服從楚亦勢也襄二十九年夏五月閽弒吳子餘祭與吳子使札來聘文不隔月蓋餘祭使札在先被弒在後札之至魯未及聞喪故請觀周樂而後去魯據吳赴則餘祭弒在前季札至在後則追書於來聘之上杜注孔疏皆極明白傳言城杞在六月而士鞅之聘杞子之盟俱在城杞之下則札來在六月可知春秋於夏五月下連系七事更不隔月者蓋使五月書吳子弒六月書吳子使札則將以札為夷昧所使而君尚未葬概行吉禮益滋後人之疑矣襄二十八年十有二月天王崩靈王乙未楚子昭卒明年春王正月書公在楚夏五月書公至自楚不奔天王之喪而送楚子之葬何也三十年夏四月蔡世子般弒其君固冬十月葬蔡景公即書㑹於澶淵宋災故不討弒君之賊而恤失火之災何故公在楚為天王崩而書非以存君宋災故為葬蔡景公而書非為失信子野卒而立禱穆叔不欲而季孫立之蓋立長立賢權臣所忌也莒人弒其君密州程子曰莒子虐國人弒之而立展輿展輿非親弒是也如傳云展輿因國人以攻莒子則弒君與父不容不書且經云密州傳云買朱鉏顯與經異當以經為正宋之㑹晉楚並伯申之㑹昭四年夏楚専㑹諸侯而獨伯矣然魯辭以祭衛辭以疾曹邾辭以難楚威雖盛而諸侯之未肯甘心服從猶可見也在㑹而執徐子蓋欲以威諸侯至秋而伐吳則宋鄭滕小邾亦不與矣中軍之舍昭五年春乘叔孫豹之卒豹卒於四年冬十二月不特卑公室并以弱仲叔二家也惠牆伊戻之讒太子痤也以坎牲加書平公既知痤之寃而烹伊戻矣及寺人栁之讒華合比也亦坎牲加書平公又信之一法再施而又屢驗何以接踵蹈襲平公明而復暗佐無左師之聒亦絶不為解也此傳之可疑者昭七年春王正月暨齊平傳曰齊求之也若謂與燕平則下云燕人行成盟於濡上且歸燕姬賂以瑶罋玉櫝斚耳是燕求之不應云齊求之若云與魯平則齊魯十數年中並無怨隙自崔杼伐我北鄙之後襄二十五年已有慶封之聘未嘗搆怨何事議和即云昭公即位以來未嘗與齊通好然但求通好㑹可也盟可也何必言乎李氏亷謂下文又有叔孫涖盟正與叔還涖盟之事相類然鄭人來輸平隱六年則平狐壤之怨定十年及齊平則平八年侵齊伐魯之怨定十一年及鄭平則平六年侵鄭取匡之怨獨此與下涖盟後雖有屬而前則無根以經文求之則暨齊平即䝉上伐北燕為文間時不間事而叔孫涖盟在三月公如楚之後間事復間時則以為燕齊平較優葬陳哀公誰葬之輿嬖袁克葬之是未必成葬禮諸侯未必敢往㑹葬楚靈之暴并未必能葬故君以示恩而春秋書葬者與下書㑹陳陳災同為特筆以絀楚而存陳也楚子䖍誘蔡侯般殺之於申書楚子名變例也公羊曰絶之胡氏曰惡之髙氏閌曰同斥其名以見其罪同說皆是然楚靈罪大極惡非書名足以蔽辜毛西河說實未得確然之義春秋非失國而生名者衛侯煅及楚子䖍許世子止弒其君買三傳皆以為非弒諸儒釋之又以不嘗藥為無解於弒以合經文然左氏言止奔晉榖梁言止未踰年而死其紀已有參差吾謂春秋原情定罪竟以許止蔡般一例並書未免漫無區别歐陽公竟以止為弒君非無見也公羊曰葬許悼公是君子之赦止也然則葬蔡景公亦赦般乎髠頑之弒以瘧疾赴楚麇之弒以瘧疾赴所以掩飾者亦復略同曽子問曰諸侯之祭社稷俎豆既陳聞天子崩后之喪君薨夫人之喪如之何孔子曰廢然則是四者雖祭亦告卿大夫之卒則不告也榖梁言大夫之卒雖祭禮皆告於君檀弓仲遂卒猶繹仲尼曰非禮也卿卒不繹然則卿大夫之喪正祭不可廢而繹祭可廢也何休言禮大夫死為廢一時之祭有事於廟而聞之者去樂卒事而聞之者廢繹是故萬入去籥非禮之禮也繹祭尚可廢豈去籥足以明待大臣之禮乎叔弓蓋涖事而卒於廟非當祭而告也去樂卒事乃禮之正與去籥一失一得昭二十二年六月叔鞅如京師葬景王王室亂此春秋特筆也魯之如京師者止此矣王室之亂亦無復能安定之者矣既傷無王兼惜無伯昔時子頺子帶之難恃有桓文起而定之今則兩王並立共主播遷至四年之後始為黃父之㑹猶曰將待明年怠敖至此欲其勤王以求諸侯者亦不可得故特書王室亂所以重責盟主而兼及諸侯子朝告諸侯之詞甚直其言王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也穆后及太子壽早夭即世單劉贊私立少以間先王亦惟伯仲叔季圖之蓋子朝是庶長而王猛敬王是太子母弟劉單奉嫡以絀庶尹毛奉長以絀幼故子朝以齒序為辭自春秋書王子猛卒又書天王居於狄泉尹氏立王子朝然後天位大定而庶長不得干嫡幼之分明矣王城曰東都對西京而言此一東西周也東都自平王東遷以來世居之洛誥所謂卜澗水東瀍水西惟洛食傳所謂定鼎於郟鄏是也亦名上都成周下都也周公遷殷頑民於此洛誥所謂卜瀍水東亦惟洛食是也而成周在王城東故子朝據王城敬王入成周萇𢎞以敬王為東王子朝為西王此又一東西周也敬王不居王城晉率諸侯城成周遂定都焉則以下都為東周而非郟鄏之舊矣洎考王封其弟揭於河南曰河南桓公乃前東都即子朝所據稱為西周威烈王時桓公孫惠公復封其少子班於鞏曰東周惠公韓趙即其所封分為二顯王寄居東周鞏也赧王復遷西周東都也而周遂亡此又一東西周則又以鞏為東周而非下都矣昭公兩朝晉而一見止五如晉而四不得入此失國出奔之由也季氏所畏者晉而無忌於齊使公朝必見盟㑹必與睦於盟主則季氏逐君詎能晏然惟意如結援晉臣而惡公於晉使晉視公藐然若無而不復有敬禮之心使公亦與晉愈疏而不敢倚以自固臣交日密主勢日孤然後無君之心大逞公雖流徙播遷無復援而納之者季氏竟安意肆志據有魯國矣故公之見辱於晉正意如之謀而薨於乾侯張本也釋春秋而責昭公是以成敗論人假令鬷戾不救平子出亡則將以剛果善斷許之而不復罪其輕發矣公若公為公果公賁郈氏臧孫皆以私怨若禘於襄公萬者二人而衆萬於季氏則大夫之怨平子乃公憤也僚祖告公至於再三而曰非小人所及亦非一味輕舉特誤以公果輩為可恃而不知其亦徼幸於一勝耳然伐季氏而入其門無敢倒㦸而禦者即孟叔二家觀望不動登臺之請惶急已甚此際能有操縱使孟叔不救而聽其出亡未至一敗塗地是公之伐季氏在不知人而不可專責以逞私妄動也讒人以君僥幸奪門諸臣是矣昭公入國甚易而竟薨於乾侯者由齊晉無助之者也凡君出奔者必立一君以為之敵如鄭之突衛之叔武及剽皆是而昭公既出君仍虛位未嘗别立新主意如雖强然孟孫終不為助而甚畏於晉車馬衣屨之饋僞為周旋晉定使荀躒一訊詞哀而理屈不敢悍然出無君之言較之祭仲髙渠彌元咺孫林父寧喜輩其惡不如至若叔孫昭子孟懿子皆欲納公未嘗得罪通國而卒不得歸者其不能自歸則為從者所劫其不能正季氏之罪而歸魯君者則在齊晉之君皆昏弱臣皆貪黷而無勤恤之意也梁丘據取貨而齊為季援矣范獻子取貨而晉為季援矣景及頃定皆瞢然無定見紛紛之議反若季氏逐君為順天而存昭公失國為逆天而亡者伯圖不競君臣之義益不明於天下經書曰次於陽州齊侯唁公於野井齊侯使髙張來唁公晉侯使荀躒唁公於乾侯控於大邦唁之而已使在桓文時安得至此此春秋所傷也公至自齊居於鄆其設主以行告至之禮與否不可知也前年次於陽州唁於野井皆齊地此書至自齊者明鄆之猶為魯地也然上言齊侯取鄆後言鄆潰二十九年見此一隅之地猶藉人之力有之而卒不能有自是削跡於魯而一民尺土非公有矣城成周說者以為善列國非也王室之亂在昭公二十二年踰年而晉有圍郊之師四年而晉有黃父之㑹及成周之城閲十年矣有怠慢若此而謂之尊王勤王者乎天王入於成周無一字及晉納王見春秋之深惡晉矣公薨於乾侯甚意如之惡也有君不事致淹恤在外八年而卒客死其罪上通於天矣其不敢篡不敢别立君者外懼討而內則孟叔不同心也說春秋者反責昭公可謂不識輕重是必祭則寡人含羞忍垢而老死牖下者乃為賢也是猶以髙貴鄉公為罪而末減司馬氏也定公即位於六月戊辰六月以前為昭六月以後為定然不可一年兩君而昭之薨在十二月故即書定元年仍是踰年改元之例若昭薨於正月則定雖六月即位不得書定元年正月二月無事故書春王三月左氏公榖離而析之故諸儒有正始而明王法不與季氏頒朔之論惟邵氏寶趙氏恆余氏光之說最簡易其竟不書正月者昭公之喪未歸定公之位未定故不欲如隱莊閔僖之例無事亦書所以存其實也以不討賊責定公是又欲其上告天子下告方伯也可謂不識時務汪氏克寬以不討賊責之而家氏鉉翁并例定於篡更深文矣春秋但據事直書書日者見猶是殯而即位之常書即位者正以明嗣君繼及之始不與季之得專廢立也書法詳明豈有先罪定公之意定公初年夫子不仕是未有用之者說者更謂昭定之際子有所歉故然集注於子奚不為政亦及此意實則非也若云惡定公之立不正與季氏之逐君當始終痛絶決志不仕何以惡於初年而恕於中葉又何以惡平子而恕桓子乎秋七月癸巳葬我君昭公痛之也距薨則八月距喪歸則踰月又葬之墓道南是不成乎為葬而猶曰我君也此魯臣所泚顙也我君而如此薨如此喪歸又如此葬也此聖人所痛心也春秋隨筆卷下
